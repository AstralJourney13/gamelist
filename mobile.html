        }

            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
            color: #e2e8f0;
            line-height: 1.5;
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
        }

        /* 固定头部 */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(26, 32, 44, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 15px;
            border-bottom: 2px solid rgba(56, 178, 172, 0.3);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 1.3em;
            color: #38b2ac;
            margin-bottom: 8px;
            font-weight: 700;
            text-align: center;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            gap: 8px;
            margin-top: 10px;
        }

        .stat-item {
            text-align: center;
            flex: 1;
            background: rgba(56, 178, 172, 0.1);
            padding: 6px;
            border-radius: 6px;
            border: 1px solid rgba(56, 178, 172, 0.25);
        }

        .stat-number {
            font-size: 1.3em;
            font-weight: bold;
            color: #38b2ac;
            display: block;
        }

        .stat-label {
            font-size: 0.7em;
            color: #a0aec0;
        }

        /* 搜索栏 */
        .search-container {
            padding: 12px 15px;
            background: rgba(45, 55, 72, 0.8);
            position: sticky;
            top: 120px;
            z-index: 99;
            backdrop-filter: blur(8px);
        }

        .search-box {
            display: flex;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            padding: 10px 12px;
            background: rgba(26, 32, 44, 0.8);
            border: 1px solid rgba(56, 178, 172, 0.4);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
        }

        .search-input::placeholder {
            color: #718096;
        }

        .filter-toggle {
            padding: 10px 14px;
            background: rgba(56, 178, 172, 0.2);
            border: 1px solid rgba(56, 178, 172, 0.4);
            border-radius: 8px;
            color: #38b2ac;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        /* 筛选面板 */
        .filter-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: rgba(45, 55, 72, 0.9);
            padding: 0 15px;
        }

        .filter-panel.active {
            max-height: 500px;
            padding: 15px;
        }

        .filter-group {
            margin-bottom: 12px;
        }

        .filter-label {
            color: #ed8936;
            font-size: 0.85em;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }

        .filter-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 12px;
            background: rgba(56, 178, 172, 0.15);
            border: 1px solid rgba(56, 178, 172, 0.4);
            border-radius: 6px;
            color: #cbd5e0;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: rgba(56, 178, 172, 0.4);
            border-color: #38b2ac;
            color: #fff;
        }

        /* 游戏卡片 */
        .games-container {
            padding: 15px;
        }

        .game-card {
            background: rgba(45, 55, 72, 0.85);
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid rgba(56, 178, 172, 0.2);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .game-image {
            position: relative;
            width: 100%;
            padding-top: 46.74%;
            background: rgba(26, 32, 44, 0.8);
            overflow: hidden;
        }

        .game-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7em;
            font-weight: 600;
            color: white;
            backdrop-filter: blur(4px);
        }

        .game-content {
            padding: 12px;
        }

        .game-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #38b2ac;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .game-title a {
            color: inherit;
            text-decoration: none;
            flex: 1;
        }

        .steam-icon {
            color: #66c0f4;
            font-size: 0.9em;
        }

        .game-meta {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .meta-tag {
            padding: 3px 8px;
            background: rgba(237, 137, 54, 0.15);
            border: 1px solid rgba(237, 137, 54, 0.3);
            border-radius: 4px;
            font-size: 0.7em;
            color: #ed8936;
        }

        .game-info {
            font-size: 0.85em;
            color: #a0aec0;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .game-info strong {
            color: #cbd5e0;
        }

        .expand-btn {
            width: 100%;
            padding: 8px;
            background: rgba(56, 178, 172, 0.15);
            border: 1px solid rgba(56, 178, 172, 0.3);
            border-radius: 6px;
            color: #38b2ac;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .expand-btn:active {
            background: rgba(56, 178, 172, 0.25);
        }

        .game-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            margin-top: 10px;
        }

        .game-details.active {
            max-height: 1000px;
        }

        .detail-row {
            padding: 6px 0;
            border-bottom: 1px solid rgba(56, 178, 172, 0.1);
            font-size: 0.8em;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #ed8936;
            font-weight: 600;
            margin-right: 8px;
        }

        .detail-value {
            color: #cbd5e0;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        /* 返回顶部按钮 */
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(56, 178, 172, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(56, 178, 172, 0.4);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .back-to-top.visible {
            opacity: 1;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #38b2ac;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(56, 178, 172, 0.2);
            border-top-color: #38b2ac;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        let currentFilter = 'all';
        let currentStatus = 'all';
        let currentSearch = '';
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderGames();
            initEventListeners();
        });
        
        // 事件监听
        function initEventListeners() {
            // 搜索
            document.getElementById('searchInput').addEventListener('input', function(e) {
                currentSearch = e.target.value.toLowerCase();
                renderGames();
            });
            
            // 筛选切换
            document.getElementById('filterToggle').addEventListener('click', function() {
                const panel = document.getElementById('filterPanel');
                panel.classList.toggle('active');
                this.textContent = panel.classList.contains('active') ? '筛选 ▲' : '筛选 ▼';
            });
            
            // 类型筛选
            document.querySelectorAll('[data-filter]').forEach(btn => {
                btn.addEventListener('click', function() {
                    currentFilter = this.dataset.filter;
                    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    renderGames();
                });
            });
            
            // 状态筛选
            document.querySelectorAll('[data-status]').forEach(btn => {
                btn.addEventListener('click', function() {
                    currentStatus = this.dataset.status;
                    document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    renderGames();
                });
            });
            
            // 返回顶部
            const backToTop = document.getElementById('backToTop');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 300) {
                    backToTop.classList.add('visible');
                } else {
                    backToTop.classList.remove('visible');
                }
            });
            
            backToTop.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }
        
        // 渲染游戏列表
        function renderGames() {
            const container = document.getElementById('gamesContainer');
            const emptyState = document.getElementById('emptyState');
            
            // 筛选游戏
            let filtered = gamesData.filter(game => {
                // 搜索过滤
                if (currentSearch && !game.游戏名称.toLowerCase().includes(currentSearch)) {
                    return false;
                }
                
                // 类型过滤
                if (currentFilter !== 'all' && !game.标签组合.includes(currentFilter)) {
                    return false;
                }
                
                // 状态过滤
                if (currentStatus !== 'all') {
                    if (currentStatus === '活跃' && !game.商业表现.includes('✅')) {
                        return false;
                    }
                    if (currentStatus === 'EA' && !game.商业表现.includes('EA')) {
                        return false;
                    }
                    if (currentStatus === '关服' && !game.商业表现.includes('关服')) {
                        return false;
                    }
                }
                
                return true;
            });
            
            // 更新显示计数
            document.getElementById('displayCount').textContent = filtered.length;
            
            // 显示结果
            if (filtered.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
            } else {
                container.style.display = 'block';
                emptyState.style.display = 'none';
                
                container.innerHTML = filtered.map((game, index) => {
                    const tags = game.标签组合.split('、').slice(0, 4);
                    const badge = getBadge(game.商业表现);
                    const imageUrl = game.imageUrl || 'https://via.placeholder.com/460x215/2d3748/38b2ac?text=' + encodeURIComponent(game.游戏名称);
                    
                    return `
                        <div class="game-card">
                            <div class="game-image">
                                <img src="${imageUrl}" alt="${game.游戏名称}" loading="lazy">
                                <div class="game-badge" style="background: ${badge.color}">${badge.text}</div>
                            </div>
                            <div class="game-content">
                                <div class="game-title">
                                    ${game.steamUrl ? `<a href="${game.steamUrl}" target="_blank">${game.游戏名称}</a>` : game.游戏名称}
                                    ${game.steamUrl ? '<span class="steam-icon">🎮</span>' : ''}
                                </div>
                                <div class="game-meta">
                                    ${tags.map(tag => `<span class="meta-tag">${tag}</span>`).join('')}
                                </div>
                                <div class="game-info">
                                    <strong>USP:</strong> ${game.核心USP || '未知'}<br>
                                    <strong>峰值:</strong> ${game.Steam峰值同时在线 || '未知'}<br>
                                    <strong>销量:</strong> ${game['累计销量/玩家'] || '未知'}
                                </div>
                                <button class="expand-btn" onclick="toggleDetails(this)">查看详情 ▼</button>
                                <div class="game-details">
                                    <div class="detail-row">
                                        <span class="detail-label">发行日期:</span>
                                        <span class="detail-value">${game.发行日期 || '未知'}</span>
                                    </div>
                                    <div class="detail-row">
                                        <span class="detail-label">当前玩家:</span>
                                        <span class="detail-value">${game['当前活跃玩家(2026.3)'] || '未知'}</span>
                                    </div>
                                    <div class="detail-row">
                                        <span class="detail-label">商业表现:</span>
                                        <span class="detail-value">${game.商业表现 || '未知'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }
        
        // 获取徽章信息
        function getBadge(performance) {
            if (performance.includes('盈利') || performance.includes('成功')) {
                return { text: '商业成功', color: 'rgba(72, 187, 120, 0.95)' };
            } else if (performance.includes('失败') || performance.includes('关服')) {
                return { text: '已关服', color: 'rgba(245, 101, 101, 0.95)' };
            } else {
                return { text: '运营中', color: 'rgba(237, 137, 54, 0.95)' };
            }
        }
        
        // 切换详情
        function toggleDetails(btn) {
            const details = btn.nextElementSibling;
            const isActive = details.classList.contains('active');
            
            details.classList.toggle('active');
            btn.textContent = isActive ? '查看详情 ▼' : '收起详情 ▲';
        }
    </script>
</body>
</html>
