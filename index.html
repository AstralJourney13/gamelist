        }

        .header p {

            color: #a0aec0;
            margin-bottom: 20px;
        }

            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        .stat-item {
            background: rgba(56, 178, 172, 0.1);
            padding: 12px 24px;
            border-radius: 8px;
            border: 1px solid rgba(56, 178, 172, 0.3);
        }

        .stat-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #38b2ac;
        }

        .stat-label {
            font-size: 0.9em;
            color: #a0aec0;
            margin-top: 5px;
        }

        /* 筛选栏 */
        .filter-bar {
            background: rgba(45, 55, 72, 0.6);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .filter-label {
            color: #ed8936;
            font-weight: 600;
        }

        .filter-btn {
            padding: 8px 16px;
            background: rgba(56, 178, 172, 0.15);
            border: 1px solid rgba(56, 178, 172, 0.4);
            border-radius: 20px;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #38b2ac;
            border-color: #38b2ac;
            color: #1a202c;
            transform: translateY(-2px);
        }

        /* 搜索框 */
        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            background: rgba(26, 32, 44, 0.6);
            border: 1px solid rgba(56, 178, 172, 0.4);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 0.95em;
        }

        .search-box input::placeholder {
            color: #718096;
        }

        /* 游戏网格 */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        /* 游戏卡片 */
        .game-card {
            background: rgba(45, 55, 72, 0.8);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(56, 178, 172, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: #38b2ac;
            box-shadow: 0 20px 40px rgba(56, 178, 172, 0.3);
        }

        .game-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            position: relative;
        }

        .game-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(237, 137, 54, 0.95);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            backdrop-filter: blur(10px);
        }

        .game-content {
            padding: 20px;
        }

        .game-title {
            font-size: 1.4em;
            font-weight: 700;
            color: #38b2ac;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .steam-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #38b2ac;
            text-decoration: none;
            transition: all 0.3s;
            font-size: 0.9em;
            padding: 4px 10px;
            background: rgba(56, 178, 172, 0.1);
            border-radius: 6px;
        }

        .steam-link:hover {
            background: #38b2ac;
            color: #1a202c;
            transform: translateX(3px);
        }

        .game-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }

        .tag {
            background: rgba(56, 178, 172, 0.15);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            color: #81e6d9;
            border: 1px solid rgba(56, 178, 172, 0.3);
        }

        .game-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
        }

        .stat-box {
            background: rgba(26, 32, 44, 0.5);
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid #38b2ac;
        }

        .stat-box-label {
            font-size: 0.75em;
            color: #a0aec0;
            margin-bottom: 4px;
        }

        .stat-box-value {
            font-size: 1em;
            font-weight: 600;
            color: #e2e8f0;
        }

        .game-usp {
            background: rgba(237, 137, 54, 0.1);

            padding: 10px;
            border-radius: 6px;
            font-size: 0.85em;
            color: #fbd38d;
            margin-top: 12px;
            line-height: 1.5;
        }

            display: inline-block;

            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8em;
            font-weight: 600;
            margin-top: 10px;
            border: 1px solid rgba(72, 187, 120, 0.3);
        }

        /* 页脚 */

            text-align: center;
            padding: 30px;
            color: #718096;
            font-size: 0.9em;
        }

            .games-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            }
        }

            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-card {
            animation: fadeIn 0.6s ease-out;
        }

            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }

            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        // 生成Steam链接

            if (steamId) {
                return `https://store.steampowered.com/app/${steamId}`;
            }
            // 对于没有映射的游戏，返回Steam搜索链接

        };

        // 生成游戏图片URL（使用Steam的header图片）
        function getGameImage(gameName) {
            // 优先使用自定义URL
            if (customImageUrls[gameName]) {
                return customImageUrls[gameName];
            }
            
            const steamId = steamIds[gameName];
            if (steamId) {
                // 优先使用Steam CDN的header图片
                return `https://cdn.akamai.steamstatic.com/steam/apps/${steamId}/header.jpg`;
            }
            // 默认占位图
            return `https://via.placeholder.com/460x215/2d3748/38b2ac?text=${encodeURIComponent(gameName)}`;
        }

                `https://cdn.cloudflare.steamstatic.com/steam/apps/${steamId}/header.jpg`,
                `https://steamcdn-a.akamaihd.net/steam/apps/${steamId}/header.jpg`,
                `https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/${steamId}/header.jpg`
            ];
        }
        
        // 图片加载错误处理
        function handleImageError(img, gameName) {
            const steamId = steamIds[gameName];
            if (!steamId) {
                img.src = `https://via.placeholder.com/460x215/2d3748/38b2ac?text=${encodeURIComponent(gameName)}`;
                return;
            }
            
            // 如果还没尝试过备用源
            if (!img.dataset.backupTried) {
                img.dataset.backupTried = '1';
                img.src = `https://cdn.cloudflare.steamstatic.com/steam/apps/${steamId}/header.jpg`;
            } else if (img.dataset.backupTried === '1') {
                img.dataset.backupTried = '2';
                img.src = `https://steamcdn-a.akamaihd.net/steam/apps/${steamId}/header.jpg`;
            } else if (img.dataset.backupTried === '2') {
                img.dataset.backupTried = '3';
                img.src = `https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/${steamId}/header.jpg`;
            } else {
                // 所有备用源都失败，使用占位图
                img.src = `https://via.placeholder.com/460x215/2d3748/38b2ac?text=${encodeURIComponent(gameName)}`;
            }
        }

        // 判断商业状态
        function getBusinessStatus(performance) {
            if (performance && (performance.includes('盈利') || performance.includes('成功'))) {
                return 'success';
            } else if (performance && (performance.includes('失败') || performance.includes('关服'))) {
                return 'failed';
            }
            return 'normal';
        }

        // 渲染游戏卡片
        function renderGames(games) {
            const grid = document.getElementById('gamesGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (games.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';
            
            grid.innerHTML = games.map((game, index) => {
                const tags = game.标签组合 ? game.标签组合.split('、') : [];
                const status = getBusinessStatus(game.商业表现);
                const badge = status === 'success' ? '商业成功' : status === 'failed' ? '已关服' : '运营中';
                const badgeColor = status === 'success' ? 'rgba(72, 187, 120, 0.95)' : 
                                   status === 'failed' ? 'rgba(245, 101, 101, 0.95)' : 
                                   'rgba(237, 137, 54, 0.95)';

                return `
                    <div class="game-card" style="animation-delay: ${index * 0.05}s">
                        <div class="game-image">
                            <img src="${getGameImage(game.游戏名称)}" 
                                 alt="${game.游戏名称}"
                                 onerror="handleImageError(this, '${game.游戏名称.replace(/'/g, "\\'")}')"
                                 loading="lazy">

        // 筛选功能
        let currentFilter = 'all';
        let currentSearch = '';

        function filterGames() {
            let filtered = gamesData;

            // 应用筛选
            if (currentFilter !== 'all') {
                filtered = filtered.filter(game => {
                    const tags = game.标签组合 || '';
                    const performance = game.商业表现 || '';
                    
                    switch(currentFilter) {
                        case 'pvpve':
                            return tags.includes('PvPvE');
                        case 'pve':
                            return tags.includes('合作') && !tags.includes('PvPvE');
                        case '搜打撤':
                            return tags.includes('搜打撤');
                        case '社交恐怖':
                            return tags.includes('社交恐怖');
                        case '成功':
                            return performance.includes('盈利') || performance.includes('成功');
                        case '失败':
                            return performance.includes('失败') || performance.includes('关服');
                        default:
                            return true;
                    }
                });
            }

            // 应用搜索
            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                filtered = filtered.filter(game => {
                    return (game.游戏名称 && game.游戏名称.toLowerCase().includes(searchLower)) ||
                           (game.标签组合 && game.标签组合.toLowerCase().includes(searchLower)) ||
                           (game.核心USP && game.核心USP.toLowerCase().includes(searchLower));
                });
            }

            renderGames(filtered);
            document.getElementById('totalGames').textContent = filtered.length;
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                filterGames();
            });
        });

        // 搜索框输入事件
        document.getElementById('searchInput').addEventListener('input', function(e) {
            currentSearch = e.target.value;

        });

        // 初始化渲染
        renderGames(gamesData);
    </script>
